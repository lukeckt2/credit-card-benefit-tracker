services:
  credit-card-benefits:
    build:
      context: .
    container_name: credit-card-benefits
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - ${APP_PORT:-8787}:8000
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
